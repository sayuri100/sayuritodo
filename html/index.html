<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古手帐日程效率监督</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Merriweather:wght@300;400&display=swap');
        
        body {
            font-family: 'Merriweather', serif;
            background-color: #f5f1e8;
            color: #3d3226;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23e0d6c3' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .heading-font { font-family: 'Playfair Display', serif; }
        .paper-bg {
            background-color: #fbf8f3;
            border: 1px solid #e0d6c3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        .lace-border::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px dashed #d4c8b0;
            pointer-events: none;
        }
        .torn-edge { clip-path: polygon(0 0, 95% 0, 100% 50%, 95% 100%, 0 100%, 5% 50%); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1ebe0; }
        ::-webkit-scrollbar-thumb { background: #c5b8a0; border-radius: 4px; }
        
        .tag-completed { background-color: #5a7d5a; color: #fff; }
        .tag-inprogress { background-color: #a67c52; color: #fff; }
        .tag-pending { background-color: #8c8c8c; color: #fff; }
        
        .chart-container {
            position: relative;
            width: 100%;
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 10px;
            border-bottom: 1px solid #e0d6c3;
        }
        .bar {
            background-color: #8c7b68;
            width: 20px;
            margin: 0 5px;
            position: relative;
            transition: height 0.3s ease;
            border-radius: 2px 2px 0 0;
        }
        
        .login-container { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page { display: none; }
        .page.active { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 登录页面 -->
    <div id="login-page" class="login-container min-h-screen flex items-center justify-center p-4">
        <div class="paper-bg max-w-md w-full p-8 relative">
            <div class="absolute -top-2 -right-2 text-yellow-900 opacity-20 text-4xl"><i class="fas fa-key"></i></div>
            <div class="absolute -bottom-2 -left-2 text-yellow-900 opacity-20 text-4xl"><i class="fas fa-music"></i></div>
            
            <div class="text-center mb-8">
                <h1 class="heading-font text-4xl font-bold text-brown-800 mb-2">复古日程效率监督</h1>
                <p class="text-brown-600 italic">您的高效规划，从此刻开始</p>
                <div class="w-16 h-1 bg-amber-700 mx-auto my-4"></div>
            </div>

            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2" for="username">用户名</label>
                    <input class="w-full p-2 border border-brown-300 rounded focus:outline-none focus:ring-2 focus:ring-amber-500 bg-amber-50" type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2" for="password">密码</label>
                    <input class="w-full p-2 border border-brown-300 rounded focus:outline-none focus:ring-2 focus:ring-amber-500 bg-amber-50" type="password" id="password" placeholder="请输入密码" required>
                </div>
                <div class="flex items-center justify-between">
                    <button class="bg-amber-700 hover:bg-amber-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-300" type="submit">
                        进入规划
                    </button>
                    <button type="button" onclick="showModal()" class="inline-block align-baseline font-bold text-sm text-amber-700 hover:text-amber-900">
                        导入数据
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 主应用页面 -->
    <div id="app-page" class="hidden container mx-auto p-4 md:p-8">
        <!-- 头部导航 -->
        <header class="paper-bg p-6 mb-6 relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="heading-font text-3xl md:text-4xl font-bold text-brown-900">复古日程效率监督</h1>
                    <p class="text-brown-700" id="current-date">2024年1月1日 星期一</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-sm text-brown-600">欢迎回来，</p>
                        <p class="font-bold text-brown-800" id="welcome-user">用户</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-amber-200 flex items-center justify-center text-amber-800 font-bold border-2 border-amber-400">
                        <i class="fas fa-user"></i>
                    </div>
                    <button onclick="showModal()" class="text-brown-600 hover:text-brown-900" title="数据管理">
                        <i class="fas fa-file-export text-xl"></i>
                    </button>
                </div>
            </div>
            
            <!-- 导航标签 -->
            <nav class="border-b border-brown-300">
                <ul class="flex space-x-8">
                    <li><a href="#" onclick="showPage('dashboard'); return false;" class="tab-link active pb-2 border-b-2 border-amber-700 text-amber-800 font-bold">仪表盘</a></li>
                    <li><a href="#" onclick="showPage('tasks'); return false;" class="tab-link pb-2 text-brown-600 hover:text-amber-700">任务管理</a></li>
                    <li><a href="#" onclick="showPage('calendar'); return false;" class="tab-link pb-2 text-brown-600 hover:text-amber-700">日历视图</a></li>
                </ul>
            </nav>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧主内容区 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 今日任务列表 -->
                <div id="dashboard-tasks" class="page active paper-bg p-6 relative">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="heading-font text-xl font-bold text-brown-800"><i class="fas fa-tasks mr-2 text-amber-700"></i>今日任务清单</h2>
                        <span class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full">今日焦点</span>
                    </div>
                    <div class="space-y-3" id="task-list"></div>
                    <div class="mt-4 flex space-x-2">
                        <input type="text" id="new-task-input" placeholder="添加新任务..." class="flex-1 p-2 border border-brown-300 rounded bg-amber-50">
                        <select id="new-task-status" class="p-2 border border-brown-300 rounded bg-amber-50">
                            <option value="pending">未开始</option>
                            <option value="inprogress">进行中</option>
                            <option value="completed">已完成</option>
                        </select>
                        <button onclick="addTask()" class="bg-amber-700 hover:bg-amber-800 text-white py-2 px-4 rounded transition duration-300">
                            <i class="fas fa-plus"></i> 添加
                        </button>
                    </div>
                </div>

                <!-- 周计划概览 -->
                <div id="dashboard-weekly" class="page active paper-bg p-6 relative">
                    <h2 class="heading-font text-xl font-bold text-brown-800 mb-4"><i class="fas fa-calendar-week mr-2 text-amber-700"></i>周计划概览</h2>
                    <div class="grid grid-cols-7 gap-2 text-center mb-4">
                        <div class="text-xs font-bold text-brown-600">周一</div>
                        <div class="text-xs font-bold text-brown-600">周二</div>
                        <div class="text-xs font-bold text-brown-600">周三</div>
                        <div class="text-xs font-bold text-brown-600">周四</div>
                        <div class="text-xs font-bold text-brown-600">周五</div>
                        <div class="text-xs font-bold text-brown-600">周六</div>
                        <div class="text-xs font-bold text-brown-600">周日</div>
                    </div>
                    <div class="grid grid-cols-7 gap-2 h-24" id="weekly-overview-grid"></div>
                </div>

                <!-- 任务管理页面 -->
                <div id="tasks-page" class="page hidden paper-bg p-6">
                    <h2 class="heading-font text-xl font-bold text-brown-800 mb-4"><i class="fas fa-list-check mr-2 text-amber-700"></i>所有任务</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-brown-700">
                            <thead class="text-xs text-brown-700 bg-amber-50">
                                <tr>
                                    <th class="px-4 py-3">任务</th>
                                    <th class="px-4 py-3">日期</th>
                                    <th class="px-4 py-3">状态</th>
                                    <th class="px-4 py-3">进度</th>
                                    <th class="px-4 py-3">操作</th>
                                </tr>
                            </thead>
                            <tbody id="all-tasks-list"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 日历视图页面 -->
                <div id="calendar-page" class="page hidden paper-bg p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="heading-font text-xl font-bold text-brown-800"><i class="fas fa-calendar-alt mr-2 text-amber-700"></i>月历视图</h2>
                        <div class="flex space-x-2">
                            <button onclick="changeMonth(-1)" class="px-3 py-1 bg-amber-100 text-amber-800 rounded hover:bg-amber-200">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <span id="month-year-header" class="font-bold text-brown-800 px-4">2024年1月</span>
                            <button onclick="changeMonth(1)" class="px-3 py-1 bg-amber-100 text-amber-800 rounded hover:bg-amber-200">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-brown-600 mb-2">
                        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center" id="calendar-grid"></div>
                    
                    <div class="mt-6 p-4 bg-amber-50 rounded border border-amber-200">
                        <h3 class="font-bold text-brown-800 mb-2">当日任务</h3>
                        <div id="day-tasks-list"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧侧边栏 -->
            <div class="space-y-6">
                <!-- 完成率统计 -->
                <div class="paper-bg p-6 text-center relative">
                    <div class="absolute top-2 right-2 text-brown-300"><i class="fas fa-stopwatch"></i></div>
                    <h3 class="text-sm text-brown-600 mb-1">本周完成率</h3>
                    <div class="relative w-32 h-32 mx-auto mb-2">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <circle cx="18" cy="18" r="15.9155" fill="none" stroke="#e0d6c3" stroke-width="2"></circle>
                            <circle id="completion-circle" cx="18" cy="18" r="15.9155" fill="none" stroke="#5a7d5a" stroke-width="2" stroke-dasharray="54 100" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span class="text-2xl font-bold text-brown-800" id="completion-rate">85%</span>
                        </div>
                    </div>
                    <p class="text-xs text-brown-500">本周已完成任务</p>
                </div>

                <!-- 甘特图 -->
                <div class="paper-bg p-6">
                    <h3 class="text-sm font-bold text-brown-800 mb-3"><i class="fas fa-chart-bar mr-2 text-amber-700"></i>进度甘特图</h3>
                    <div class="chart-container" id="gantt-chart"></div>
                </div>

                <!-- 快速统计 -->
                <div class="paper-bg p-6">
                    <h3 class="text-sm font-bold text-brown-800 mb-3">任务统计</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-brown-600">总计：</span>
                            <span class="font-bold" id="total-tasks">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-green-600">已完成：</span>
                            <span class="font-bold" id="completed-tasks">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-yellow-600">进行中：</span>
                            <span class="font-bold" id="inprogress-tasks">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">未开始：</span>
                            <span class="font-bold" id="pending-tasks">0</span>
                        </div>
                    </div>
                </div>

                <!-- 快捷添加 -->
                <div class="paper-bg p-6">
                    <h3 class="text-sm font-bold text-brown-800 mb-3">快速添加</h3>
                    <input type="text" id="quick-task-input" placeholder="任务描述..." class="w-full p-2 mb-2 border border-brown-300 rounded bg-amber-50 text-sm">
                    <div class="flex space-x-2">
                        <select id="quick-task-status" class="flex-1 p-2 border border-brown-300 rounded bg-amber-50 text-sm">
                            <option value="pending">未开始</option>
                            <option value="inprogress">进行中</option>
                            <option value="completed">已完成</option>
                        </select>
                        <button onclick="quickAddTask()" class="bg-amber-700 hover:bg-amber-800 text-white py-1.5 px-3 rounded text-sm transition duration-300">添加</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据管理模态框 -->
    <div id="data-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="paper-bg p-6 max-w-md w-full m-4 relative">
            <h3 class="heading-font text-lg font-bold mb-4">数据管理</h3>
            <p class="text-sm text-brown-600 mb-4">您的数据存储在本地浏览器中。导出数据以备份，导入以恢复。</p>
            <div class="space-y-3">
                <button onclick="exportData()" class="w-full bg-green-700 hover:bg-green-800 text-white py-2 px-4 rounded transition duration-300 flex items-center justify-center">
                    <i class="fas fa-download mr-2"></i> 导出数据 (JSON)
                </button>
                <div class="flex space-x-2">
                    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
                    <button onclick="document.getElementById('import-file').click()" class="flex-1 bg-blue-700 hover:bg-blue-800 text-white py-2 px-4 rounded transition duration-300 flex items-center justify-center">
                        <i class="fas fa-upload mr-2"></i> 导入数据
                    </button>
                    <button onclick="logout()" class="flex-1 bg-red-700 hover:bg-red-800 text-white py-2 px-4 rounded transition duration-300 flex items-center justify-center">
                        <i class="fas fa-sign-out-alt mr-2"></i> 退出登录
                    </button>
                </div>
            </div>
            <button onclick="closeModal()" class="absolute top-2 right-2 text-brown-500 hover:text-brown-800">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <script>
        // 全局状态
        let currentUser = null;
        let tasks = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;

        // DOM 加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('planner_current_user');
            if (savedUser) {
                currentUser = savedUser;
                loadData();
                showApp();
            } else {
                showLogin();
            }

            // 登录表单提交
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                if (username && password) {
                    currentUser = username;
                    localStorage.setItem('planner_current_user', currentUser);
                    loadData();
                    showApp();
                } else {
                    alert('请输入用户名和密码');
                }
            });

            updateDateTime();
            setInterval(updateDateTime, 60000);
        });

        // 显示/隐藏页面
        function showLogin() {
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('app-page').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('app-page').classList.remove('hidden');
            updateWelcomeMessage();
            renderAll();
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-link').forEach(link => {
                link.classList.remove('active', 'border-b-2', 'border-amber-700', 'text-amber-800');
                link.classList.add('text-brown-600');
            });
            
            document.getElementById(`${page}-page`).classList.remove('hidden');
            event.target.classList.add('active', 'border-b-2', 'border-amber-700', 'text-amber-800');
        }

        // 登出功能
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('planner_current_user');
                currentUser = null;
                tasks = [];
                closeModal();
                showLogin();
            }
        }

        // 更新欢迎语
        function updateWelcomeMessage() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', options);
            document.getElementById('welcome-user').textContent = currentUser || '用户';
        }

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            if (document.getElementById('current-date')) {
                document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', options);
            }
        }

        // 数据持久化
        function saveData() {
            if (currentUser) {
                localStorage.setItem(`planner_data_${currentUser}`, JSON.stringify(tasks));
            }
        }

        function loadData() {
            if (currentUser) {
                const savedData = localStorage.getItem(`planner_data_${currentUser}`);
                if (savedData) {
                    tasks = JSON.parse(savedData);
                } else {
                    // 初始化示例数据
                    tasks = [
                        { id: 1, text: '完成项目提案', date: formatDate(new Date()), status: 'completed', progress: 100 },
                        { id: 2, text: '上午10点团队会议', date: formatDate(addDays(new Date(), 1)), status: 'inprogress', progress: 50 },
                        { id: 3, text: '购买生活用品', date: formatDate(addDays(new Date(), 2)), status: 'pending', progress: 0 },
                        { id: 4, text: '阅读书籍第三章', date: formatDate(addDays(new Date(), 3)), status: 'pending', progress: 0 },
                        { id: 5, text: '准备演示文稿', date: formatDate(new Date()), status: 'inprogress', progress: 30 },
                        { id: 6, text: '户外跑步30分钟', date: formatDate(addDays(new Date(), 5)), status: 'pending', progress: 0 },
                        { id: 7, text: '检查周报告', date: formatDate(addDays(new Date(), 6)), status: 'pending', progress: 0 },
                    ];
                    saveData();
                }
            }
        }

        // 任务操作
        function addTask() {
            const text = document.getElementById('new-task-input').value;
            const status = document.getElementById('new-task-status').value;
            if (text) {
                const newTask = {
                    id: Date.now(),
                    text: text,
                    date: formatDate(new Date()),
                    status: status,
                    progress: status === 'completed' ? 100 : status === 'inprogress' ? 50 : 0
                };
                tasks.push(newTask);
                document.getElementById('new-task-input').value = '';
                saveData();
                renderAll();
            }
        }

        function quickAddTask() {
            const text = document.getElementById('quick-task-input').value;
            const status = document.getElementById('quick-task-status').value;
            if (text) {
                const newTask = {
                    id: Date.now(),
                    text: text,
                    date: formatDate(new Date()),
                    status: status,
                    progress: status === 'completed' ? 100 : status === 'inprogress' ? 50 : 0
                };
                tasks.push(newTask);
                document.getElementById('quick-task-input').value = '';
                saveData();
                renderAll();
            }
        }

        function updateTaskStatus(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = newStatus;
                task.progress = newStatus === 'completed' ? 100 : newStatus === 'inprogress' ? 50 : 0;
                saveData();
                renderAll();
            }
        }

        function deleteTask(id) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== id);
                saveData();
                renderAll();
            }
        }

        // 渲染函数
        function renderAll() {
            renderTaskList();
            renderAllTasks();
            renderCompletionRate();
            renderTaskStats();
            renderGanttChart();
            renderWeeklyOverview();
            renderCalendar();
        }

        function renderTaskList() {
            const listEl = document.getElementById('task-list');
            listEl.innerHTML = '';
            
            const today = formatDate(new Date());
            const todayTasks = tasks.filter(t => t.date === today);
            
            if (todayTasks.length === 0) {
                listEl.innerHTML = '<p class="text-center text-brown-500 py-4">今日无任务，添加一些吧！</p>';
                return;
            }
            
            todayTasks.forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = 'flex items-center justify-between p-3 bg-amber-50 rounded border border-amber-200 hover:bg-amber-100 transition';
                taskEl.innerHTML = `
                    <div class="flex items-center">
                        <input type="checkbox" ${task.status === 'completed' ? 'checked' : ''} onchange="updateTaskStatus(${task.id}, '${task.status === 'completed' ? 'pending' : 'completed'}')" class="mr-3 h-5 w-5 text-amber-700 rounded">
                        <span class="${task.status === 'completed' ? 'line-through text-brown-400' : ''}">${task.text}</span>
                    </div>
                    <div class="flex items-center">
                        <span class="tag-${task.status} text-xs px-2 py-1 rounded mr-2">${getStatusText(task.status)}</span>
                        <button onclick="deleteTask(${task.id})" class="text-brown-400 hover:text-red-600"><i class="fas fa-trash-alt text-sm"></i></button>
                    </div>
                `;
                listEl.appendChild(taskEl);
            });
        }

        function renderAllTasks() {
            const listEl = document.getElementById('all-tasks-list');
            listEl.innerHTML = '';
            
            tasks.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(task => {
                const row = document.createElement('tr');
                row.className = 'bg-white border-b hover:bg-amber-50';
                row.innerHTML = `
                    <td class="px-4 py-3">${task.text}</td>
                    <td class="px-4 py-3">${formatDisplayDate(task.date)}</td>
                    <td class="px-4 py-3">
                        <select onchange="updateTaskStatus(${task.id}, this.value)" class="tag-${task.status} text-xs px-2 py-1 rounded border-0">
                            <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>未开始</option>
                            <option value="inprogress" ${task.status === 'inprogress' ? 'selected' : ''}>进行中</option>
                            <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>已完成</option>
                        </select>
                    </td>
                    <td class="px-4 py-3">
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-amber-600 h-2 rounded-full" style="width: ${task.progress}%"></div>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <button onclick="deleteTask(${task.id})" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                listEl.appendChild(row);
            });
        }

        function renderCompletionRate() {
            const completedTasks = tasks.filter(t => t.status === 'completed').length;
            const totalTasks = tasks.length;
            const rate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            document.getElementById('completion-rate').textContent = `${rate}%`;
            const circle = document.getElementById('completion-circle');
            const circumference = 2 * Math.PI * 15.9155;
            const offset = circumference - (rate / 100) * circumference;
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = offset;
        }

        function renderTaskStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const inprogress = tasks.filter(t => t.status === 'inprogress').length;
            const pending = tasks.filter(t => t.status === 'pending').length;
            
            document.getElementById('total-tasks').textContent = total;
            document.getElementById('completed-tasks').textContent = completed;
            document.getElementById('inprogress-tasks').textContent = inprogress;
            document.getElementById('pending-tasks').textContent = pending;
        }

        function renderGanttChart() {
            const chartEl = document.getElementById('gantt-chart');
            chartEl.innerHTML = '';
            
            const recentTasks = tasks.slice(0, 5);
            recentTasks.forEach(task => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${task.progress}%`;
                bar.title = `${task.text} - ${task.progress}%`;
                bar.style.backgroundColor = task.status === 'completed' ? '#5a7d5a' : task.status === 'inprogress' ? '#a67c52' : '#c5b8a0';
                chartEl.appendChild(bar);
            });
        }

        function renderWeeklyOverview() {
            const gridEl = document.getElementById('weekly-overview-grid');
            gridEl.innerHTML = '';
            
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            
            for (let i = 0; i < 7; i++) {
                const day = new Date(startOfWeek);
                day.setDate(startOfWeek.getDate() + i);
                const dateStr = formatDate(day);
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.status === 'completed').length;
                
                const dayEl = document.createElement('div');
                dayEl.className = 'flex flex-col items-center justify-end h-full p-1 border border-transparent hover:border-amber-300 cursor-pointer';
                dayEl.innerHTML = `
                    <div class="text-xs mb-1">${['一','二','三','四','五','六','日'][i]}</div>
                    <div class="text-lg font-bold mb-1 ${dateStr === formatDate(today) ? 'text-amber-700' : ''}">${day.getDate()}</div>
                    ${completed > 0 ? `<div class="w-4 h-4 rounded-full bg-green-600 mb-1"></div>` : ''}
                    <div class="text-[10px] text-brown-500">${completed}/${dayTasks.length}</div>
                `;
                gridEl.appendChild(dayEl);
            }
        }

        function renderCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            const monthYearHeader = document.getElementById('month-year-header');
            calendarGrid.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay();
            
            monthYearHeader.textContent = `${currentYear}年${currentMonth + 1}月`;
            
            for (let i = 0; i < startDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'p-2 border border-transparent';
                calendarGrid.appendChild(emptyDiv);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.status === 'completed').length;
                const isToday = dateStr === formatDate(new Date());
                
                const dayDiv = document.createElement('div');
                dayDiv.className = `p-2 border ${isToday ? 'border-amber-500 bg-amber-50' : 'border-amber-100'} h-12 flex flex-col items-center justify-start cursor-pointer hover:bg-amber-50`;
                dayDiv.innerHTML = `
                    <div class="text-sm font-bold ${isToday ? 'text-amber-700' : ''}">${day}</div>
                    ${completed > 0 ? `<div class="w-2 h-2 rounded-full bg-green-600 mt-1"></div>` : ''}
                `;
                dayDiv.onclick = () => showDayTasks(dateStr, day);
                calendarGrid.appendChild(dayDiv);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function showDayTasks(dateStr, day) {
            selectedDate = dateStr;
            const dayTasks = tasks.filter(t => t.date === dateStr);
            const container = document.getElementById('day-tasks-list');
            
            container.innerHTML = `<p class="text-sm text-brown-600 mb-2">${currentYear}年${currentMonth + 1}月${day}日</p>`;
            
            if (dayTasks.length === 0) {
                container.innerHTML += '<p class="text-center text-brown-500 py-4">当日无任务</p>';
                return;
            }
            
            dayTasks.forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = 'flex items-center justify-between p-2 mb-2 bg-white rounded border';
                taskEl.innerHTML = `
                    <span class="${task.status === 'completed' ? 'line-through' : ''}">${task.text}</span>
                    <span class="tag-${task.status} text-xs px-2 py-1 rounded">${getStatusText(task.status)}</span>
                `;
                container.appendChild(taskEl);
            });
        }

        // 工具函数
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function formatDisplayDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function getStatusText(status) {
            const statusMap = { 'pending': '未开始', 'inprogress': '进行中', 'completed': '已完成' };
            return statusMap[status] || status;
        }

        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        // 数据导入导出
        function showModal() {
            document.getElementById('data-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('data-modal').classList.add('hidden');
        }

        function exportData() {
            if (!currentUser) return;
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `planner_backup_${currentUser}_${formatDate(new Date())}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedTasks = JSON.parse(e.target.result);
                    if (Array.isArray(importedTasks)) {
                        tasks = importedTasks;
                        saveData();
                        renderAll();
                        alert('数据导入成功！');
                        closeModal();
                    } else {
                        alert('文件格式无效');
                    }
                } catch (error) {
                    alert('解析文件时出错：' + error.message);
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
